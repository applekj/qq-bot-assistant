version: "3"

services:
  redis-server:
    image: redis:latest
    command: redis-server --requirepass 1234567
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ai-server:
    build: ./
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://:1234567@redis-server:6379/0

volumes:
  redis_data: